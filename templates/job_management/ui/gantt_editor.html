<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Job Management · Gantt Editor (Skill-First)</title>
    <style>
      :root {
        --bg: #0b0d12;
        --panel: rgba(255,255,255,0.06);
        --border: rgba(255,255,255,0.10);
        --text: rgba(255,255,255,0.92);
        --muted: rgba(255,255,255,0.62);
        --accent: #4f8cff;
        --warn: #f59e0b;
        --ok: #22c55e;
      }
      html, body { height: 100%; background: transparent; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        color: var(--text);
        background: transparent;
      }
      .wrap {
        height: 100%;
        min-height: 360px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 12px;
        box-sizing: border-box;
      }
      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 12px;
        border: 1px solid var(--border);
        background: var(--panel);
        border-radius: 12px;
      }
      .title {
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 0;
      }
      .title strong { font-size: 13px; }
      .title span { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
      button {
        appearance: none;
        border: 1px solid var(--border);
        background: rgba(255,255,255,0.06);
        color: var(--text);
        border-radius: 10px;
        padding: 8px 10px;
        font-size: 12px;
        cursor: pointer;
        transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
      }
      button:hover { background: rgba(255,255,255,0.10); border-color: rgba(255,255,255,0.18); }
      button:active { transform: scale(0.98); }
      button.primary { background: rgba(79,140,255,0.18); border-color: rgba(79,140,255,0.35); }
      button.primary:hover { background: rgba(79,140,255,0.25); border-color: rgba(79,140,255,0.50); }
      .grid {
        flex: 1;
        min-height: 0;
        border: 1px solid var(--border);
        background: rgba(0,0,0,0.18);
        border-radius: 12px;
        overflow: hidden;
        display: grid;
        grid-template-columns: 220px 1fr;
      }
      .left {
        border-right: 1px solid var(--border);
        background: rgba(255,255,255,0.04);
        padding: 10px;
        overflow: auto;
      }
      .right {
        position: relative;
        overflow: auto;
        padding: 10px;
      }
      .task {
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 10px;
        border: 1px solid rgba(255,255,255,0.08);
        background: rgba(255,255,255,0.04);
        border-radius: 12px;
        margin-bottom: 10px;
      }
      .task strong { font-size: 12px; }
      .task .meta { font-size: 11px; color: var(--muted); }
      .timeline {
        position: relative;
        min-width: 720px;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.10);
        background: rgba(255,255,255,0.03);
        padding: 10px;
        box-sizing: border-box;
      }
      .lane {
        position: relative;
        height: 40px;
        border-radius: 10px;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.07);
        margin-bottom: 10px;
        overflow: hidden;
      }
      .bar {
        position: absolute;
        top: 7px;
        bottom: 7px;
        border-radius: 8px;
        background: rgba(79,140,255,0.75);
        border: 1px solid rgba(79,140,255,0.55);
        cursor: grab;
        display: flex;
        align-items: center;
        padding: 0 10px;
        box-sizing: border-box;
        gap: 8px;
        user-select: none;
      }
      .bar:active { cursor: grabbing; }
      .bar .label { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .handle {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 10px;
        background: rgba(255,255,255,0.18);
        cursor: ew-resize;
        opacity: 0.0;
        transition: opacity 120ms ease;
      }
      .bar:hover .handle { opacity: 0.55; }
      .handle.left { left: 0; border-top-left-radius: 8px; border-bottom-left-radius: 8px; }
      .handle.right { right: 0; border-top-right-radius: 8px; border-bottom-right-radius: 8px; }
      .hint { font-size: 11px; color: var(--muted); line-height: 1.45; }
      .status { font-size: 11px; color: var(--muted); }
      .status b { color: var(--text); }
      .pill { display: inline-flex; align-items: center; gap: 6px; padding: 2px 8px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.10); background: rgba(255,255,255,0.04); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <div class="title">
          <strong>甘特编辑器（拖拽调整）</strong>
          <span id="subtitle">等待宿主注入 state…</span>
        </div>
        <div class="actions">
          <button id="btnReload">重新加载 JSON</button>
          <button id="btnReset">重置示例</button>
          <button class="primary" id="btnConfirm">确认修改并回传</button>
        </div>
      </div>

      <div class="grid">
        <div class="left">
          <div class="hint">
            - 拖拽条块移动开始/结束时间（按天对齐）。<br/>
            - 两侧拖拽手柄可调整时长。<br/>
            - 点击右上角“确认”会把更新后的 JSON 通过 <span class="pill"><b>skill_web_intent</b></span> 透传回 Skill。
          </div>
          <div style="height:10px"></div>
          <div id="taskList"></div>
        </div>
        <div class="right">
          <div class="timeline" id="timeline"></div>
          <div class="status" id="status"></div>
        </div>
      </div>
    </div>

    <script>
      const CLAW_PLATFORM = "claw-platform";
      const CLAW_UPDATE = "CLAW_UPDATE_STATE";
      const SKILL_WEB_INTENT = "skill_web_intent";

      let injectedState = null;
      let schedule = null;

      const elSubtitle = document.getElementById("subtitle");
      const elTaskList = document.getElementById("taskList");
      const elTimeline = document.getElementById("timeline");
      const elStatus = document.getElementById("status");

      function parseISODate(s) {
        if (!s) return null;
        const t = String(s).trim();
        if (!t) return null;
        // date-only
        if (/^\d{4}-\d{2}-\d{2}$/.test(t)) return new Date(t + "T00:00:00Z");
        const d = new Date(t);
        return isNaN(d.getTime()) ? null : d;
      }

      function formatDate(d) {
        const y = d.getUTCFullYear();
        const m = String(d.getUTCMonth() + 1).padStart(2, "0");
        const day = String(d.getUTCDate()).padStart(2, "0");
        return `${y}-${m}-${day}`;
      }

      function addDays(d, days) {
        const out = new Date(d.getTime());
        out.setUTCDate(out.getUTCDate() + days);
        return out;
      }

      function clamp(n, a, b) { return Math.max(a, Math.min(b, n)); }

      function defaultSchedule() {
        const base = new Date();
        base.setUTCHours(0,0,0,0);
        return {
          schemaVersion: 1,
          updatedAt: new Date().toISOString(),
          tasks: [
            { id: "t1", name: "规划设计排期", group: "计划初排", start: formatDate(addDays(base, 0)), end: formatDate(addDays(base, 3)) },
            { id: "t2", name: "工程安装排期", group: "计划初排", start: formatDate(addDays(base, 3)), end: formatDate(addDays(base, 8)) },
            { id: "t3", name: "集群联调排期", group: "计划初排", start: formatDate(addDays(base, 8)), end: formatDate(addDays(base, 12)) }
          ],
          milestones: [
            { id: "m1", name: "到货", date: formatDate(addDays(base, 1)) },
            { id: "m2", name: "上电", date: formatDate(addDays(base, 5)) },
            { id: "m3", name: "上线", date: formatDate(addDays(base, 11)) }
          ],
          criticalPaths: [
            { id: "cp1", name: "关键路径一", tasks: ["t1","t2","t3"] }
          ]
        };
      }

      async function fetchJson(path) {
        const url = `/api/file?path=${encodeURIComponent(path)}&t=${Date.now()}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        if (!text.trim()) return null;
        return JSON.parse(text);
      }

      async function loadSchedule() {
        const p = injectedState && injectedState.schedulePath ? String(injectedState.schedulePath) : "";
        if (!p) {
          schedule = defaultSchedule();
          return;
        }
        try {
          const j = await fetchJson(p);
          schedule = (j && typeof j === "object") ? j : defaultSchedule();
        } catch (e) {
          schedule = defaultSchedule();
        }
      }

      function computeRange(tasks) {
        const pairs = [];
        for (const t of tasks) {
          const s = parseISODate(t.start);
          const e = parseISODate(t.end);
          if (!s || !e) continue;
          pairs.push([s, e]);
        }
        if (!pairs.length) {
          const now = new Date(); now.setUTCHours(0,0,0,0);
          return [now, addDays(now, 14)];
        }
        let min = pairs[0][0], max = pairs[0][1];
        for (const [s,e] of pairs) {
          if (s < min) min = s;
          if (e > max) max = e;
        }
        min = addDays(min, -1);
        max = addDays(max,  1);
        return [min, max];
      }

      function dayDiff(a, b) {
        const ms = 24*3600*1000;
        return Math.round((b.getTime() - a.getTime()) / ms);
      }

      function render() {
        if (!schedule) return;
        const tasks = Array.isArray(schedule.tasks) ? schedule.tasks : [];
        elTaskList.innerHTML = "";
        elTimeline.innerHTML = "";

        const [minDt, maxDt] = computeRange(tasks);
        const totalDays = Math.max(1, dayDiff(minDt, maxDt));

        const lane = document.createElement("div");
        lane.className = "lane";
        elTimeline.appendChild(lane);

        const pxPerDay = 28; // visual density
        elTimeline.style.minWidth = `${Math.max(720, totalDays * pxPerDay + 60)}px`;

        function toLeftPct(d) {
          const dd = clamp(dayDiff(minDt, d), 0, totalDays);
          return (dd / totalDays) * 100.0;
        }

        function toWidthPct(s, e) {
          const ds = clamp(dayDiff(minDt, s), 0, totalDays);
          const de = clamp(dayDiff(minDt, e), 0, totalDays);
          const w = Math.max(0, de - ds);
          return (w / totalDays) * 100.0;
        }

        // list + bars
        tasks.forEach((t, idx) => {
          const s = parseISODate(t.start) || minDt;
          const e = parseISODate(t.end) || addDays(s, 1);

          const card = document.createElement("div");
          card.className = "task";
          card.innerHTML = `<strong>${t.name || t.id || ("task-"+idx)}</strong>
            <div class="meta">${formatDate(s)} → ${formatDate(e)} · ${t.group || "未分组"}</div>`;
          elTaskList.appendChild(card);

          const bar = document.createElement("div");
          bar.className = "bar";
          bar.style.left = `${toLeftPct(s)}%`;
          bar.style.width = `${Math.max(1.2, toWidthPct(s, e))}%`;
          bar.title = `${t.name || t.id}｜${formatDate(s)}→${formatDate(e)}`;
          bar.innerHTML = `
            <div class="handle left"></div>
            <div class="label">${t.name || t.id || ("task-"+idx)}</div>
            <div class="handle right"></div>
          `;
          lane.appendChild(bar);

          const leftHandle = bar.querySelector(".handle.left");
          const rightHandle = bar.querySelector(".handle.right");

          let dragMode = null; // "move" | "left" | "right"
          let startX = 0;
          let startS = s, startE = e;

          const onDown = (mode) => (ev) => {
            ev.preventDefault();
            dragMode = mode;
            startX = ev.clientX;
            startS = parseISODate(t.start) || s;
            startE = parseISODate(t.end) || e;
            bar.setPointerCapture(ev.pointerId);
          };
          const onMove = (ev) => {
            if (!dragMode) return;
            const dx = ev.clientX - startX;
            const days = Math.round(dx / pxPerDay);
            if (days === 0) return;
            let nextS = startS, nextE = startE;
            if (dragMode === "move") {
              nextS = addDays(startS, days);
              nextE = addDays(startE, days);
            } else if (dragMode === "left") {
              nextS = addDays(startS, days);
              if (nextS >= nextE) nextS = addDays(nextE, -1);
            } else if (dragMode === "right") {
              nextE = addDays(startE, days);
              if (nextE <= nextS) nextE = addDays(nextS, 1);
            }
            t.start = formatDate(nextS);
            t.end = formatDate(nextE);
            // update visuals
            bar.style.left = `${toLeftPct(nextS)}%`;
            bar.style.width = `${Math.max(1.2, toWidthPct(nextS, nextE))}%`;
            bar.title = `${t.name || t.id}｜${formatDate(nextS)}→${formatDate(nextE)}`;
            card.querySelector(".meta").textContent = `${formatDate(nextS)} → ${formatDate(nextE)} · ${t.group || "未分组"}`;
          };
          const onUp = () => { dragMode = null; };

          bar.addEventListener("pointerdown", onDown("move"));
          leftHandle.addEventListener("pointerdown", onDown("left"));
          rightHandle.addEventListener("pointerdown", onDown("right"));
          bar.addEventListener("pointermove", onMove);
          bar.addEventListener("pointerup", onUp);
          bar.addEventListener("pointercancel", onUp);
        });

        elStatus.textContent = `Range: ${formatDate(minDt)} → ${formatDate(maxDt)} · tasks=${tasks.length} · updatedAt=${schedule.updatedAt || "-"}`;
      }

      function postWebIntent(text) {
        window.parent.postMessage({ type: SKILL_WEB_INTENT, text }, "*");
      }

      function buildResultIntent() {
        const tid = injectedState && injectedState.threadId ? String(injectedState.threadId) : "";
        const skillName = injectedState && injectedState.skillName ? String(injectedState.skillName) : "job_management";
        const ridBase = injectedState && injectedState.requestIdBase ? String(injectedState.requestIdBase) : "req";
        const requestId = `${ridBase}:schedule:${Date.now()}`;
        return JSON.stringify({
          type: "chat_card_intent",
          verb: "skill_runtime_result",
          payload: {
            type: "skill_runtime_result",
            threadId: tid,
            skillName,
            requestId,
            status: "ok",
            action: "jm_apply_schedule_draft",
            result: { scheduleDraft: schedule }
          }
        });
      }

      document.getElementById("btnReload").addEventListener("click", async () => {
        await loadSchedule();
        render();
      });
      document.getElementById("btnReset").addEventListener("click", async () => {
        schedule = defaultSchedule();
        render();
      });
      document.getElementById("btnConfirm").addEventListener("click", () => {
        if (!schedule) return;
        schedule.updatedAt = new Date().toISOString();
        const text = buildResultIntent();
        postWebIntent(text);
      });

      window.addEventListener("message", (event) => {
        const data = event.data;
        if (!data || typeof data !== "object") return;
        if (data.source !== CLAW_PLATFORM || data.type !== CLAW_UPDATE) return;
        const payload = data.payload || null;
        injectedState = payload;
        const sid = injectedState && injectedState.schedulePath ? String(injectedState.schedulePath) : "";
        elSubtitle.textContent = sid ? `JSON: ${sid}` : "未提供 schedulePath（使用示例）";
        loadSchedule().then(render);
      });

      // Boot: render placeholder with default schedule until state arrives.
      (async () => {
        schedule = defaultSchedule();
        render();
      })();
    </script>
  </body>
</html>
